# Generate Markdown API docs from TSDoc (TypeDoc) and push to the repo GitHub Wiki.
#
# Triggers when commits land on main (including merging a PR into main).
#
# Prerequisites:
#   - Wiki enabled: Repository Settings → Features → Wikis
#   - GITHUB_TOKEN (default) with contents: write — used to push to REPO.wiki.git
#
# Docs: https://typedoc.org/ | https://github.com/typedoc/typedoc-plugin-markdown

name: Publish wiki docs

on:
  push:
    branches:
      - main
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "typedoc.json"
      - "docs/API_README.md"
      - ".github/workflows/publish-wiki.yml"
  workflow_dispatch:

concurrency:
  group: publish-wiki-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-wiki:
    name: TypeDoc → GitHub Wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Markdown from TSDoc
        run: npm run docs:wiki

      - name: Publish to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"
          WIKI_DIR=wiki-checkout
          DOCS_SRC=build/wiki-docs

          if [ ! -d "$DOCS_SRC" ] || [ -z "$(ls -A "$DOCS_SRC" 2>/dev/null)" ]; then
            echo "No documentation output in $DOCS_SRC"
            exit 1
          fi

          if git clone "$WIKI_URL" "$WIKI_DIR" 2>/dev/null; then
            echo "Cloned existing wiki"
          else
            echo "Initializing new wiki repository"
            mkdir -p "$WIKI_DIR"
            cd "$WIKI_DIR"
            git init
            git remote add origin "$WIKI_URL"
            cd -
          fi

          cd "$WIKI_DIR"
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "../${DOCS_SRC}/." .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "Wiki already up to date"
            exit 0
          fi

          git commit -m "docs: update API reference from ${GITHUB_SHA:0:7}"
          git branch -M master 2>/dev/null || true
          git push -u origin master 2>/dev/null || git push -u origin main
