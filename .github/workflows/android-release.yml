# Android release pipeline: audit → lint & test → EAS build → GitHub Release
#
# Triggers when commits land on main (including merging a PR into main).
#
# Required repository secrets:
#   EXPO_TOKEN — Expo personal access token (https://expo.dev/accounts/[account]/settings/access-tokens)
#
# See: https://docs.expo.dev/build/building-on-ci/

name: Android release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Jest
        run: pnpm exec jest --ci --coverage=false

  eas-build:
    name: EAS build (release APK)
    needs: [audit, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK on EAS
        run: |
          eas build \
            --platform android \
            --profile release \
            --non-interactive \
            --wait \
            --json > eas-build.json

      - name: Resolve build id
        id: build
        run: |
          BUILD_ID=$(jq -r 'if type == "array" then .[0].id else .id end' eas-build.json)
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "Could not read build id from eas-build.json:"
            cat eas-build.json
            exit 1
          fi
          echo "id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Download APK from EAS
        run: eas build:download --id "${{ steps.build.outputs.id }}" --output android-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android-release.apk
          retention-days: 14

  github-release:
    name: Publish GitHub Release
    needs: eas-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: .

      - name: Create GitHub release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.run_number }}
          name: Android APK (build ${{ github.run_number }})
          body: |
            Automated release from [workflow run ${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            - EAS profile: `release`
          files: android-release.apk
          generate_release_notes: true
